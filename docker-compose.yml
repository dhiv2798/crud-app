version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: taskdb
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./app
    container_name: flask_app
    restart: always
    ports:
      - "5200:5100"
    depends_on:
      - db
    env_file:
      - ./app/.env

volumes:
  postgres_data: